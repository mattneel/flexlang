name: Publish to PyPI

# Publishes the `flexlang` distribution to PyPI when a GitHub Release is published
# (the command it installs is still `flx`; the PyPI name is `flexlang` because
# `flx` is too close to an existing project). Uses PyPI Trusted Publishing (OIDC)
# — no API token is stored in the repo; PyPI verifies this workflow's identity
# directly. `workflow_dispatch` is a dry run: it builds and `twine check`s the
# artifacts WITHOUT uploading anywhere (no TestPyPI account required).
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Add a "pending" trusted publisher for project `flexlang`:
#     owner = mattneel, repository = flexlang,
#     workflow = publishing.yml, environment = pypi

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up mise (Python, uv)
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2

      - name: Build distributions
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/flexlang/
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
