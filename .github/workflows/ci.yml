name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (Python, uv, mdBook)
        uses: jdx/mise-action@v2

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check --output-format=github .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy

      - name: Install LLVM/MLIR 22 (for native codegen tests)
        run: bash scripts/install-llvm.sh

      - name: pytest
        run: uv run pytest

      - name: docs check (every example proven, both backends)
        run: uv run flx docs check --both

      - name: docs freshness (generated pages current)
        run: uv run flx docs build --check

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (Python, uv, mdBook)
        uses: jdx/mise-action@v2

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build docs (generated pages + mdBook)
        run: uv run flx docs build
